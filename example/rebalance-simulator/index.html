<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rebalance Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>Rebalance Simulator</h1>
  <p class="subtitle">Compare key movement: modulo hashing vs consistent hashing when nodes change.</p>
  <div class="panels">
    <section class="panel">
      <header><h2>Modulo Hashing</h2><span class="tag bad">hash(key) % N</span></header>
      <div id="modGrid" class="grid"></div>
      <div class="meta">Moved: <span id="modMoved">0</span> / <span id="modTotal">0</span> keys</div>
    </section>
    <section class="panel">
      <header><h2>Consistent Hashing</h2><span class="tag good">ring-based</span></header>
      <div id="consGrid" class="grid"></div>
      <div class="meta">Moved: <span id="consMoved">0</span> / <span id="consTotal">0</span> keys</div>
    </section>
  </div>
  <div class="controls">
    <button id="addNode">+ Add Node</button>
    <button id="removeNode">− Remove Node</button>
    <button id="replay">↻ Replay Last Change</button>
    <div class="nodeStatus">Nodes: <span id="nodeCount">4</span></div>
  </div>
  <div id="log" class="log"></div>
</div>
<script src="app.js"></script>
</body>
</html>
