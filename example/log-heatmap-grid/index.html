<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Heatmap Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header><h1>Log Aggregation Heatmap</h1><span id="tooltip" class="tooltip"></span></header>
  <div class="legend"><span>Less</span><canvas id="legendBar" width="120" height="14"></canvas><span>More</span><span class="sep">|</span><span class="tag err">Error</span><span class="tag wrn">Warn</span><span class="tag inf">Info</span></div>
  <div class="grid-wrap"><canvas id="heatmap"></canvas></div>
  <div id="detail"></div>
</div>
<script src="app.js"></script>
</body>
</html>
