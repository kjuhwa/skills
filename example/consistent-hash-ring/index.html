<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consistent Hash Ring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Consistent Hash Ring</h1>
  <p class="sub">Interactive consistent-hashing visualization for shard placement</p>
  <div class="controls">
    <button id="btnNode">+ Node</button>
    <button id="btnKey">+ Key</button>
    <button id="btnRemove">- Node</button>
    <button id="btnReset">Reset</button>
  </div>
  <div class="layout">
    <canvas id="ring" width="420" height="420"></canvas>
    <div id="info"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
