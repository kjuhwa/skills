<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidecar Proxy Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Sidecar Proxy Dashboard</h1><span id="clock"></span></header>
<div class="stats" id="stats"></div>
<div class="charts">
  <div class="card"><h2>Latency (ms)</h2><canvas id="latChart"></canvas></div>
  <div class="card"><h2>Throughput (req/s)</h2><canvas id="rpsChart"></canvas></div>
</div>
<div class="card" style="margin:10px"><h2>Active Sidecars</h2>
  <table id="table"><thead><tr><th>Service</th><th>Status</th><th>Connections</th><th>P99 (ms)</th><th>Error %</th></tr></thead><tbody></tbody></table>
</div>
<script src="app.js"></script>
</body>
</html>
