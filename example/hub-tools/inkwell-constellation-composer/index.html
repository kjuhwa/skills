<body>
<header>
  <h1>Inkwell Constellation Composer</h1>
  <div class="meta">velvet cartography · lantern-lit skies · forgotten stars</div>
</header>
<main>
  <section class="inputs">
    <label>theme tokens (space-separated, ≥ 2 recommended)
      <input id="tokens" value="velvet forgotten inkwell lantern drifting paper whale"/>
    </label>
    <label>strategy
      <select id="strategy">
        <optgroup label="poetic"><option value="velvet">velvet</option><option value="inkwell">inkwell</option></optgroup>
        <optgroup label="nautical"><option value="cartographer">cartographer</option><option value="tidal">tidal</option></optgroup>
        <optgroup label="celestial"><option value="lantern">lantern</option><option value="nebular">nebular</option></optgroup>
        <optgroup label="bestiary"><option value="whale">whale</option><option value="fleet">fleet</option></optgroup>
      </select>
    </label>
    <label>stars <input id="stars" type="number" min="5" max="24" value="11"/></label>
    <label>seed <input id="seed" type="number" value="1701"/></label>
    <div class="row">
      <button id="forge">forge constellation</button>
      <button id="jitter">jitter (±TTL)</button>
      <button id="savep">save preset</button>
      <button id="export">export .md</button>
    </div>
    <div class="warn" id="warn" hidden></div>
    <div class="presets"><h3>presets</h3><ul id="presets"></ul></div>
  </section>
  <section class="output">
    <article class="card">
      <h2 id="cname">—</h2>
      <p id="clore">press forge to chart a constellation.</p>
      <svg id="chart" viewBox="0 0 400 300"></svg>
      <details><summary>stars (<span id="cn">0</span>)</summary><ol id="clist"></ol></details>
      <details><summary>raw JSON</summary><pre id="cjson"></pre></details>
    </article>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
